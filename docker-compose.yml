services:
  app:
    image: ghcr.io/jaysisharma/eka-research/eka-research-app:latest
    container_name: eka_app
    restart: always
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DATABASE_URL=${DATABASE_URL}
      - AUTH_SECRET=${AUTH_SECRET}
      - AUTH_URL=${AUTH_URL}
      - CLOUDINARY_CLOUD_NAME=${CLOUDINARY_CLOUD_NAME}
      - CLOUDINARY_API_KEY=${CLOUDINARY_API_KEY}
      - CLOUDINARY_API_SECRET=${CLOUDINARY_API_SECRET}
    depends_on:
      - db
    networks:
      - shared_network

  db:
    image: postgres:16-alpine
    container_name: eka_db
    restart: always
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-eka_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB:-eka_research}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - shared_network

volumes:
  postgres_data:

networks:
  shared_network:
    external: true
