name: Deploy via Docker

on:
  push:
    branches: [main]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.ACCESS_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push app
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository }}/eka-research-app:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push migrator
        uses: docker/build-push-action@v5
        with:
          context: .
          target: migrator
          push: true
          tags: ghcr.io/${{ github.repository }}/eka-research-app:migrate
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Copy docker-compose.yml to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "docker-compose.yml"
          target: "/opt/eka_research/"

      - name: Deploy on Server via SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
          AUTH_URL: ${{ secrets.AUTH_URL }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
          ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
          GH_ACTOR: ${{ github.actor }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          envs: DATABASE_URL,AUTH_SECRET,AUTH_URL,POSTGRES_USER,POSTGRES_PASSWORD,POSTGRES_DB,CLOUDINARY_CLOUD_NAME,CLOUDINARY_API_KEY,CLOUDINARY_API_SECRET,ACCESS_TOKEN,GH_ACTOR
          script: |
            cd /opt/eka_research

            # Write .env from env vars injected over SSH (no heredoc indentation issues)
            printf 'DATABASE_URL=%s\n' "$DATABASE_URL" > .env
            printf 'AUTH_SECRET=%s\n' "$AUTH_SECRET" >> .env
            printf 'AUTH_URL=%s\n' "$AUTH_URL" >> .env
            printf 'POSTGRES_USER=%s\n' "$POSTGRES_USER" >> .env
            printf 'POSTGRES_PASSWORD=%s\n' "$POSTGRES_PASSWORD" >> .env
            printf 'POSTGRES_DB=%s\n' "$POSTGRES_DB" >> .env
            printf 'CLOUDINARY_CLOUD_NAME=%s\n' "$CLOUDINARY_CLOUD_NAME" >> .env
            printf 'CLOUDINARY_API_KEY=%s\n' "$CLOUDINARY_API_KEY" >> .env
            printf 'CLOUDINARY_API_SECRET=%s\n' "$CLOUDINARY_API_SECRET" >> .env

            # Log in to GitHub Container Registry
            echo "$ACCESS_TOKEN" | docker login ghcr.io -u "$GH_ACTOR" --password-stdin

            # Pull latest image and restart
            docker compose pull
            docker compose up -d

            # Clean up old unused images to save space on host
            docker image prune -a -f --filter "until=24h"
